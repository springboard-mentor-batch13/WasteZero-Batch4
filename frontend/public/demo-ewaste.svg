<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">E-waste collection demo image</title>
  <desc id="desc">Illustration of sorted electronics ready for recycling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16341f"/>
      <stop offset="1" stop-color="#48a36a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff6e8"/>
      <stop offset="1" stop-color="#9fd7b4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <circle cx="1020" cy="80" r="220" fill="#ffffff" opacity=".12"/>
  <circle cx="150" cy="530" r="180" fill="#ffffff" opacity=".08"/>
  <g transform="translate(210 135)">
    <rect x="205" y="35" width="360" height="230" rx="18" fill="#20372a"/>
    <rect x="230" y="60" width="310" height="170" rx="10" fill="url(#screen)"/>
    <rect x="350" y="265" width="70" height="46" fill="#20372a"/>
    <rect x="280" y="310" width="210" height="24" rx="12" fill="#20372a"/>
    <rect x="575" y="130" width="120" height="190" rx="20" fill="#f3fbf5"/>
    <rect x="595" y="155" width="80" height="120" rx="10" fill="#d7efe1"/>
    <circle cx="635" cy="298" r="12" fill="#48a36a"/>
    <rect x="70" y="220" width="145" height="96" rx="14" fill="#f3fbf5"/>
    <rect x="92" y="242" width="100" height="16" rx="8" fill="#48a36a"/>
    <rect x="92" y="270" width="74" height="16" rx="8" fill="#9fd7b4"/>
  </g>
  <g fill="#ffffff">
    <text x="78" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">E-Waste Collection</text>
    <text x="80" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="28" opacity=".82">Sort, recover, and recycle electronics responsibly</text>
  </g>
</svg>
