<div class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1>Create account</h1>
    <p class="subtitle">Join WasteZero and start recycling smarter</p>

    @if (error()) {
      <div class="alert">{{ error() }}</div>
    }

    <label>
      <span>Full name</span>
      <input type="text" formControlName="name" placeholder="Jane Doe" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small class="field-error">Name is required.</small>
      }
    </label>

    <label>
      <span>Email</span>
      <input type="email" formControlName="email" placeholder="you@example.com" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="field-error">Enter a valid email.</small>
      }
    </label>

    <label>
      <span>Password</span>
      <input type="password" formControlName="password" placeholder="At least 6 characters" />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small class="field-error">Password must be at least 6 characters.</small>
      }
    </label>

    <label>
      <span>I am a</span>
      <select formControlName="role">
        @for (role of roles; track role) {
          <option [value]="role">{{ role === 'volunteer' ? 'Volunteer (Resident)' : 'NGO / Collector' }}</option>
        }
      </select>
    </label>

    <label>
      <span>Location</span>
      <input type="text" formControlName="location" placeholder="City / area" />
    </label>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Creating account…' : 'Sign up' }}
    </button>

    <p class="switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </form>
</div>
