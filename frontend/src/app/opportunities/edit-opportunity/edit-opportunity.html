<div class="container" *ngIf="opportunity">

    <h2>Edit Opportunity</h2>

    <form (ngSubmit)="updateOpportunity()">

        <label>Title</label>
        <input
            type="text"
            [(ngModel)]="opportunity.title"
            name="title">

        <label>Description</label>
        <textarea
            [(ngModel)]="opportunity.description"
            name="description"
            rows="4">
        </textarea>

        <label>Duration</label>
        <input
            type="text"
            [(ngModel)]="opportunity.duration"
            name="duration">

        <label>Location</label>
        <input
            type="text"
            [(ngModel)]="opportunity.location"
            name="location">

        <button type="submit">
            Update Opportunity
        </button>

    </form>

</div>
