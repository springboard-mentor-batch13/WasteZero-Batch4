<div class="container">

  <div class="header">
    <h2>Volunteer Opportunities</h2>

    <button class="create-btn" routerLink="/opportunities/create">
      + Create Opportunity
    </button>
  </div>

  <div class="card" *ngFor="let opportunity of opportunities">

    <h3>{{ opportunity.title }}</h3>

    <p>{{ opportunity.description }}</p>

    <p>
      <strong>Skills:</strong>
      {{ opportunity.requiredSkills.join(', ') }}
    </p>

    <p>
      <strong>Duration:</strong>
      {{ opportunity.duration }}
    </p>

    <p>
      <strong>Location:</strong>
      {{ opportunity.location }}
    </p>

    <p>
      <strong>Status:</strong>

      <span class="status">
        {{ opportunity.status }}
      </span>

    </p>

    <div class="actions">

      <button
    class="edit-btn"
    [routerLink]="['/opportunities/edit', opportunity.id]">
    Edit
</button>

      <button
        class="delete-btn"
        (click)="deleteOpportunity(opportunity.id)">
        Delete
      </button>

    </div>

  </div>

</div>
